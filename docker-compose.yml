services:
  postgres:
    image: postgres:17
    container_name: whalewire-postgres
    environment:
      POSTGRES_USER: whalewire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: whalewire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whalewire -d whalewire"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: whalewire-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: whalewire
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # Stronger than diagnostics ping: node app started (closer to AMQP-ready than ping alone).
    healthcheck:
      test: ["CMD", "rabbitmqctl", "await_startup"]
      interval: 5s
      timeout: 30s
      retries: 12
      start_period: 40s

  whalewire:
    build:
      context: .
      dockerfile: WhaleWire/Dockerfile
    container_name: whalewire-app
    ports:
      - "5007:8080"
    environment:
      - ASPNETCORE_URLS=http://*:8080
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=whalewire;Username=whalewire;Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__RabbitMQ=amqp://whalewire:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - TonApi__ApiKey=${TONAPI_API_KEY:-}
      - TonCenter__BaseUrl=https://toncenter.com
      - TonCenter__ApiKey=${TONCENTER_API_KEY:-}
      - Discovery__PollingIntervalMinutes=60
      - Discovery__TopAccountsLimit=100
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: whalewire-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - whalewire

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: whalewire-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

  grafana:
    image: grafana/grafana:11.4.0
    container_name: whalewire-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  rabbitmq_data:
