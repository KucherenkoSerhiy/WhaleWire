# Prometheus config for WhaleWire
# Scrapes /metrics from whalewire and evaluates alert rules.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/whalewire.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: whalewire
    static_configs:
      - targets:
          - whalewire:8080
    metrics_path: /metrics
    scrape_interval: 30s
